            <section class="school-cafe-map-section">
                <iframe class="google-map" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d483.0601671140811!2d139.33184285464498!3d35.46399050757547!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60190152ea31c7b7%3A0x649dfa2bc76dde1a!2sMESA!5e0!3m2!1sja!2sjp!4v1779716694834!5m2!1sja!2sjp"></iframe>

            <section class="school-cafe-info-section">
                <h2 class="c-yellow-section-title">
                    <span class="c-blue">学</span><span class="c-yellow">食</span>基本情報
                </h2>
                <img class="outside-campus-img" src="img/outsideCampus.jpg" alt="九州沖縄フェアの写真"/>

                    <tr>
                        <th rowspan="3" class="bold-underline">営業時間</th>
                        <td>火,水,金</td>
                        <td>11:45~14:00</td>
                    </tr>

                    <tr>
                        <td>月,木</td>
                        <td>12:30~13:50</td>
                    </tr>

                    <tr>
                        <td class="bold-underline">休日</td>
                        <td class="bold-underline">閉店</td>

                    </tr> 
                    <tr>
                        <th>営業場所</th>
                        <td colspan="2">8号館1階</td>
                    </tr>   
                </table>
            </section>
            <section class="payment-info-section">
                <h2 class="c-yellow-section-title">お支払方法について</h2>
                <div class="payment-info">
                    <div class="card">
                        <div class="img-container">
                            <img class="background-img" src="img/genkin.png"/>

                        </div>
